# ================================================================
# SMITH SITE -- Render Deployment Config
# ================================================================
# Patron: Emre
# Bu dosya Render'da Web Service olusturmak icin kullanilir.
# GEMINI_API_KEY: Render dashboard'dan manuel girilir
# ================================================================

services:
  - type: web
    name: smith-site
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3000"
      - key: SESSION_SECRET
        generateValue: true
      - key: SITE_PASSWORD
        value: emrebeyeozel
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SITE_URL
        value: https://smith-site.onrender.com
