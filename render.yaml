# ═══════════════════════════════════════════════════════════════
# SMITH SITE — Render Deployment Config
# ═══════════════════════════════════════════════════════════════
# Patron: Emre
# Bu dosya Render'da Web Service oluşturmak için kullanılır.
# ═══════════════════════════════════════════════════════════════

services:
  - type: web
    name: smith-site
    env: node
    region: frankfurt  # En yakın sunucu (EU)
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3000"
      - key: SESSION_SECRET
        generateValue: true
      - key: SITE_PASSWORD
        value: emrebeyeozel
      - key: OPENROUTER_API_KEY
        sync: false  # Render dashboard'dan manuel girilecek
      - key: AI_MODEL
        value: deepseek/deepseek-v4-flash:free
      - key: SITE_URL
        value: https://smith-site.onrender.com
